  <style>
    :root {
      --dark:       #0a0a0a;
      --amber:      #c8823a;
      --warm-white: #f5efe6;
      --muted-fg:   rgba(245,239,230,0.6);
      --border:     rgba(200,130,58,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--warm-white);
      font-family: 'Lora', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle animated gradient background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(200,130,58,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(30,58,92,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      text-align: center;
      padding: 3.5rem 2.5rem;
      max-width: 520px;
      width: 90%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(30,42,56,0.35);
      backdrop-filter: blur(12px);
      animation: fadeUp 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Amber line accent at top of card */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(to right, transparent, var(--amber) 30%, var(--amber) 70%, transparent);
      border-radius: 2px;
    }

    .logo {
      width: 120px;
      margin: 0 auto 1.75rem;
      display: block;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    /* Animated checkmark circle */
    .check-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(200,130,58,0.12);
      border: 2px solid rgba(200,130,58,0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem;
      animation: popIn 0.5s 0.3s cubic-bezier(0.34, 1.6, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .check-wrap svg {
      width: 36px; height: 36px;
      color: var(--amber);
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.5s 0.6s ease forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      letter-spacing: 0.04em;
      color: var(--warm-white);
      margin-bottom: 0.75rem;
      animation: fadeUp 0.7s 0.4s both;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted-fg);
      line-height: 1.7;
      margin-bottom: 2rem;
      animation: fadeUp 0.7s 0.5s both;
    }

    .subtitle strong {
      color: var(--warm-white);
    }

    /* Divider */
    .divider {
      width: 40px; height: 2px;
      background: var(--amber);
      margin: 0 auto 2rem;
      border-radius: 2px;
      animation: fadeUp 0.7s 0.55s both;
    }

    /* Contact info */
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 2.25rem;
      animation: fadeUp 0.7s 0.6s both;
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 0.95rem;
      color: var(--warm-white);
    }

    .contact-row svg {
      width: 18px; height: 18px;
      color: var(--amber);
      flex-shrink: 0;
    }

    .contact-row a {
      color: var(--warm-white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-row a:hover { color: var(--amber); }

    /* Back to home button */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--amber);
      color: #1a1209;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 4px;
      transition: filter 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,130,58,0.3);
      animation: fadeUp 0.7s 0.7s both;
    }

    .btn-home:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,130,58,0.45);
    }

    .btn-home svg {
      width: 16px; height: 16px;
    }

    footer-note {
      display: block;
      margin-top: 2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: rgba(245,239,230,0.3);
      animation: fadeUp 0.7s 0.8s both;
    }
  </style>
</head>
